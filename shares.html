<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="C1991 — 作者分享 · 技术要点与热门图文">
<meta name="color-scheme" content="dark">
<title>作者分享 — C1991</title>
<link rel="icon" type="image/png" href="/images/icon.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<main class="subpage">
  <div class="subpage-container">

    <a href="/" class="subpage-back">← 返回首页</a>

    <h1 class="subpage-heading">作者分享</h1>
    <p class="subpage-desc">技术要点 · 热门图文 · 灵感收集</p>

    <div class="search-wrap">
      <input id="sharesSearch" type="search" class="search-input" placeholder="搜索分享..." aria-label="搜索分享">
    </div>

    <hr class="subpage-divider">

    <!-- Share list — time-sorted with priority ranking -->
    <div class="card-grid" id="shareGrid">
      <!-- Populated by JS -->
    </div>

    <p class="empty-state" id="shareEmpty" style="display:none;">更多分享即将到来…</p>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-divider"></div>
  <p class="copy">&copy; 2026 C1991 &middot; <a href="https://github.com/jackyang19911102/c1991">源代码</a></p>
</footer>

<script>
// ============================================================
// Author Shares — priority-sorted, time-ordered list
// ============================================================

// Share data (in production, loaded from /shares/manifest.json or similar)
const SHARES = [
  {
    title: '如何让 AI 生图更加趋近于真实感',
    desc: '去除 AI 绘画塑料感的完整方法论：从情绪感官到场景搭建的实用指南。涵盖 Prompt 工程、后期处理与风格迁移的核心技巧。',
    date: '2026.06.22',
    tag: 'AI 绘画',
    priority: 'pin',
    url: '/shares/ai-prompts.html'
  },
];

function renderShares(shares) {
  const list = document.getElementById('shareGrid');
  const empty = document.getElementById('shareEmpty');

  if (!shares.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  // Sort: priority items first, then by date descending
  const priorityOrder = { pin: 0, hot: 1, new: 2 };
  const sorted = [...shares].sort((a, b) => {
    const pa = a.priority ? (priorityOrder[a.priority] ?? 99) : 99;
    const pb = b.priority ? (priorityOrder[b.priority] ?? 99) : 99;
    if (pa !== pb) return pa - pb;
    return b.date.localeCompare(a.date);
  });

  list.innerHTML = sorted.map((s, i) => {
    const accentMap = { pin: 'accent-yellow', hot: 'accent-red', new: 'accent-blue' };
    const badgeMap = { pin: '📌 置顶', hot: '🔥 热门', new: '🆕 新发布' };
    const accent = s.priority ? accentMap[s.priority] : '';
    const badgeHTML = s.priority
      ? '<span class="sq-card-badge ' + s.priority + '">' + badgeMap[s.priority] + '</span>'
      : '';
    const rankColor = s.priority === 'pin' ? 'color:var(--color-warning)' :
                       s.priority === 'hot' ? 'color:var(--color-danger)' :
                       s.priority === 'new' ? 'color:var(--color-accent)' :
                       'color:var(--color-text-tertiary)';

    return '<a href="' + s.url + '" class="sq-card ' + accent + '">' +
      '<div class="sq-card-top">' +
        '<span class="sq-card-rank" style="' + rankColor + '">' + String(i + 1).padStart(2, '0') + '</span>' +
        badgeHTML +
      '</div>' +
      '<h3 class="sq-card-title">' + s.title + '</h3>' +
      '<p class="sq-card-desc">' + s.desc + '</p>' +
      '<div class="sq-card-meta">' +
        '<span>' + s.date + '</span>' +
        '<span class="sq-card-tag">#' + s.tag + '</span>' +
      '</div>' +
    '</a>';
  }).join('');

  if (sorted.length < 6) {
    list.innerHTML += '<div class="sq-card ghost">' +
      '<svg class="ghost-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' +
      '<span class="ghost-text">更多分享即将到来</span>' +
      '<span class="ghost-sub">敬请期待…</span>' +
    '</div>';
  }
}

// Initial render
renderShares(SHARES);

// Search filter
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('sharesSearch');
  if (!input) return;
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    const cards = document.querySelectorAll('#shareGrid .sq-card:not(.ghost)');
    const ghost = document.querySelector('#shareGrid .sq-card.ghost');
    let hasVisible = false;
    cards.forEach(card => {
      const text = card.textContent.toLowerCase();
      const match = q === '' || text.indexOf(q) !== -1;
      card.style.display = match ? '' : 'none';
      if (match) hasVisible = true;
    });
    if (ghost) ghost.style.display = q ? 'none' : '';
  });
});

// Future: load additional shares from /shares/manifest.json when available

</script>

</body>
</html>
