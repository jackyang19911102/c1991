<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="C1991 — 图文博客 · 日常打卡记录">
<meta name="color-scheme" content="dark">
<title>图文博客 — C1991</title>
<link rel="icon" type="image/png" href="/images/icon.png">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<main class="subpage">
  <div class="subpage-container" id="blogContainer">

    <a href="/" class="subpage-back" id="backLink">← 返回首页</a>

    <!-- Photo Blog view (default) -->
    <div id="photoView">
      <h1 class="subpage-heading">图文博客</h1>
      <p class="subpage-desc">日常打卡 · 生活碎片 · 影像记录</p>
      <div class="search-wrap">
        <input id="blogSearch" type="search" class="search-input" placeholder="搜索博文..." aria-label="搜索博文">
      </div>
      <hr class="subpage-divider">
      <div class="tag-filter-bar" id="tagFilter">
        <button class="tag-pill active" data-tag="all">全部</button>
        <button class="tag-pill" data-tag="打卡">打卡</button>
        <button class="tag-pill" data-tag="深圳">深圳</button>
        <button class="tag-pill" data-tag="书店">书店</button>
        <button class="tag-pill" data-tag="随笔">随笔</button>
        <button class="tag-pill" data-tag="建站">建站</button>
      </div>
      <div class="card-grid" id="photoGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">暂无内容，敬请期待…</div>
    </div>

    <!-- Post detail view (when ?post=xxx) -->
    <div id="postDetail" style="display:none;"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-divider"></div>
  <p class="copy">&copy; 2026 C1991 &middot; <a href="https://github.com/jackyang19911102/c1991">源代码</a></p>
</footer>

<script src="/js/blog.js"></script>
<script>
// ============================================================
// Mode detection & routing
// ============================================================
const params = new URLSearchParams(location.search);
const postSlug = params.get('post');
const initTag = params.get('tag');

if (postSlug) {
  // Post detail mode — use legacy blog engine
  document.getElementById('photoView').style.display = 'none';
  document.getElementById('postDetail').style.display = 'block';
  document.title = '文章 — C1991';

  // Switch back link to return to blog listing
  const backLink = document.getElementById('backLink');
  backLink.href = '/blog.html';
  backLink.textContent = '← 返回图文博客';

  (async () => {
    await Blog.init();
    await Blog.renderPost('postDetail', postSlug);
  })();

} else {
  // Photo blog grid mode
  document.getElementById('photoView').style.display = 'block';

  const PHOTO_POSTS = [];

  let activeTag = initTag || 'all';

  function renderCards(posts) {
    const grid = document.getElementById('photoGrid');
    const empty = document.getElementById('emptyState');
    if (!posts.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = posts.map(p => {
      const link = p.slug ? '?post=' + encodeURIComponent(p.slug) : null;
      const imgStyle = p.img ? "background-image:url('" + p.img + "');background-size:cover;background-position:center;" : '';
      const inner = '<div class="card-image placeholder-surface" style="' + imgStyle + '"></div>' +
        '<div class="card-body">' +
          '<h3 class="card-title">' + p.title + '</h3>' +
          '<div class="card-meta-row"><span class="card-date">' + p.date + '</span>' +
          '<span class="card-tag">#' + p.tag + '</span></div>' +
        '</div>';
      if (link) {
        return '<a href="' + link + '" class="sq-card blog-card">' + inner + '</a>';
      }
      return '<article class="sq-card blog-card">' + inner + '</article>';
    }).join('');
  }

  function applyFilters() {
    const q = document.getElementById('blogSearch').value.trim().toLowerCase();
    let filtered = activeTag === 'all' ? PHOTO_POSTS : PHOTO_POSTS.filter(p => p.tag === activeTag);
    if (q) {
      filtered = filtered.filter(p =>
        p.title.toLowerCase().includes(q) ||
        (p.tag || '').toLowerCase().includes(q) ||
        (p.date || '').includes(q)
      );
    }
    renderCards(filtered);
    document.querySelectorAll('.tag-pill').forEach(btn => btn.classList.toggle('active', btn.dataset.tag === activeTag));
  }

  function filterByTag(tag) {
    activeTag = tag;
    applyFilters();
  }

  document.getElementById('tagFilter').addEventListener('click', (e) => {
    if (e.target.classList.contains('tag-pill')) filterByTag(e.target.dataset.tag);
  });

  document.getElementById('blogSearch').addEventListener('input', applyFilters);

  // Highlight initial tag if provided
  if (initTag) filterByTag(initTag);
  else renderCards(PHOTO_POSTS);

  // Load from manifest if available
  (async () => {
    try {
      const res = await fetch('/posts/manifest.json');
      if (!res.ok) return;
      const posts = await res.json();
      const photoPosts = posts.filter(p => p.type === 'photo' || (p.tags && p.tags.includes('摄影')));
      if (photoPosts.length >= 1) {
        // Merge manifest posts with hardcoded ones, dedup by title
        const existing = new Set(PHOTO_POSTS.map(p => p.title));
        photoPosts.forEach(p => {
          if (!existing.has(p.title)) {
            const img = p.coverImage ? 'posts/images/' + p.coverImage : '';
            PHOTO_POSTS.unshift({
              title: p.title, date: p.date,
              tag: (p.tags || ['日常'])[0],
              slug: p.slug || '',
              img: img
            });
          }
        });
        filterByTag(activeTag);
      }
    } catch(e) {}
  })();
}
</script>

</body>
</html>
