<!-- Busuanzi Analytics -->
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<!-- Particle + Cards + Stats -->
<script>
// ═══════════════════════════════════════════
// Particle Background
// ═══════════════════════════════════════════
(() => {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) { canvas.style.display = 'none'; return; }

  const COUNT = 45;
  const MAX_DIST = 130;
  const COLORS = ['#6366f1','#10b981','#8b5cf6','#f59e0b'];
  let W, H, particles = [];
  let mouse = { x: -1000, y: -1000 };
  let running = true;

  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function create() {
    particles = Array.from({ length: COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.8 + 0.6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    }));
  }

  function draw() {
    if (!running) return;
    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      // Move
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;
      if (p.y < -20) p.y = H + 20;
      if (p.y > H + 20) p.y = -20;

      // Draw dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.45;
      ctx.fill();

      // Connections to nearby particles
      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const dx = p.x - q.x, dy = p.y - q.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MAX_DIST) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = p.color;
          ctx.globalAlpha = (1 - dist / MAX_DIST) * 0.12;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }

      // Connection to mouse
      const mx = p.x - mouse.x, my = p.y - mouse.y;
      const mDist = Math.sqrt(mx * mx + my * my);
      if (mDist < MAX_DIST * 1.3) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = p.color;
        ctx.globalAlpha = (1 - mDist / (MAX_DIST * 1.3)) * 0.18;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  resize();
  create();
  draw();

  window.addEventListener('resize', () => { resize(); create(); });
  document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
  document.addEventListener('visibilitychange', () => {
    running = !document.hidden;
    if (running) draw();
  });
})();

// ═══════════════════════════════════════════
// Card Stack — Hover dimming
// ═══════════════════════════════════════════
const stack = document.getElementById('card-stack');
const cards = stack.querySelectorAll('.card');

cards.forEach(card => {
  card.addEventListener('mouseenter', () => {
    cards.forEach(c => { if (c !== card) c.style.opacity = '0.3'; });
  });
  card.addEventListener('mouseleave', () => {
    cards.forEach(c => { c.style.opacity = ''; });
  });
});

// ── Stats ──
(async () => {
  // Post count
  try {
    const m = await fetch('/posts/manifest.json');
    if (m.ok) {
      const posts = await m.json();
      document.getElementById('stat-posts').textContent = posts.length;
    }
  } catch(e) {}

  // Photo count
  try {
    const p = await fetch('/images/manifest.json');
    if (p.ok) {
      const photos = await p.json();
      document.getElementById('stat-photos').textContent = photos.length;
    }
  } catch(e) {}
})();
</script>
</body>
</html>
