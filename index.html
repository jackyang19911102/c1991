<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="C1991 — 记录文字、影像、作品与思考的个人网站。">
<meta name="color-scheme" content="dark">
<title>C1991</title>
<link rel="icon" type="image/png" href="/images/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<main class="portal">

  <!-- Brand -->
  <h1 class="brand">C1991</h1>
  <p class="tagline">文字 · 影像 · 作品 · 思考</p>

  <hr class="divider">

  <!-- Navigation — 4 card-style entries -->
  <nav class="nav-cards">
    <a href="/about.html" class="nav-card">
      <span class="nav-card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <span class="nav-card-body">
        <span class="nav-card-label">关于我的</span>
        <span class="nav-card-sub">了解作者，关于本站</span>
      </span>
      <span class="nav-card-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </a>

    <a href="/blog.html" class="nav-card">
      <span class="nav-card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
      </span>
      <span class="nav-card-body">
        <span class="nav-card-label">图文博客</span>
        <span class="nav-card-sub">日常打卡 · 生活碎片</span>
      </span>
      <span class="nav-card-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </a>

    <a href="/works.html" class="nav-card">
      <span class="nav-card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </span>
      <span class="nav-card-body">
        <span class="nav-card-label">我的作品</span>
        <span class="nav-card-sub">文字创作 · 视觉作品</span>
      </span>
      <span class="nav-card-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </a>

    <a href="/shares.html" class="nav-card">
      <span class="nav-card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </span>
      <span class="nav-card-body">
        <span class="nav-card-label">作者分享</span>
        <span class="nav-card-sub">技术要点 · 灵感收集</span>
      </span>
      <span class="nav-card-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </a>
  </nav>

</main>

<!-- Unified footer with stats -->
<footer class="site-footer">
  <div class="footer-divider"></div>
  <div class="stats-bar">
    <span class="stats-item"><span class="val" id="stat-posts">-</span> 文章</span>
    <span class="stats-sep"></span>
    <span class="stats-item"><span class="val" id="stat-photos">-</span> 照片</span>
    <span class="stats-sep"></span>
    <span class="stats-item"><span class="val" id="busuanzi_value_site_pv">-</span> 浏览</span>
    <span class="stats-sep"></span>
    <span class="stats-item"><span class="val" id="busuanzi_value_site_uv">-</span> 访客</span>
  </div>
  <p class="copy">&copy; 2026 C1991 &middot; <a href="https://github.com/jackyang19911102/c1991">源代码</a></p>
</footer>

<!-- Decorative elements -->
<div class="deco deco-circle-tr"></div>
<div class="deco deco-circle-bl"></div>
<div class="deco deco-line-l"></div>
<div class="deco deco-line-r"></div>
<div class="deco deco-dot"></div>

<!-- Busuanzi Analytics -->
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<!-- Stats -->
<script>
(async () => {
  try {
    const m = await fetch('/posts/manifest.json');
    if (m.ok) {
      const posts = await m.json();
      document.getElementById('stat-posts').textContent = posts.length;
    }
  } catch(e) {}

  try {
    const p = await fetch('/images/manifest.json');
    if (p.ok) {
      const photos = await p.json();
      document.getElementById('stat-photos').textContent = photos.length;
    }
  } catch(e) {}
})();
</script>

</body>
</html>
