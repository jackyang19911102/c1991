<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to C1991</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
  }

  canvas { position: fixed; top: 0; left: 0; z-index: 0; }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 4rem;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
  }

  h1 {
    font-size: 3rem;
    font-weight: 200;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    color: #888;
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  .links {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .links a {
    color: #aaa;
    text-decoration: none;
    padding: 0.5rem 1.2rem;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    font-size: 0.85rem;
    transition: all 0.25s;
  }

  .links a:hover {
    color: #fff;
    border-color: rgba(167,139,250,0.5);
    background: rgba(167,139,250,0.1);
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.2);
    color: #34d399;
    font-size: 0.8rem;
  }

  .status::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #34d399;
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="card">
  <div class="status">Online</div>
  <h1>C1991</h1>
  <p>Projects, experiments, and ideas in progress.</p>
  <div class="links">
    <a href="https://github.com/jackyang19911102/c1991">GitHub</a>
  </div>
</div>
<script>
  const c = document.getElementById('bg');
  const ctx = c.getContext('2d');
  let t = 0;
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  resize(); addEventListener('resize', resize);
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (let i = 0; i < 40; i++) {
      const x = c.width * 0.5 + Math.sin(t * 0.0003 + i * 0.5) * (c.width * 0.35);
      const y = c.height * 0.5 + Math.cos(t * 0.0004 + i * 0.5) * (c.height * 0.35);
      ctx.beginPath();
      ctx.arc(x, y, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(167,139,250,${0.15 + Math.sin(t * 0.001 + i) * 0.1})`;
      ctx.fill();
    }
    t++;
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
