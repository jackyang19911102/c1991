<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="C1991 — Gallery">
<meta name="color-scheme" content="dark">
<title>gallery — C1991</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">C1991</a>
  <ul class="nav-links">
    <li><a href="/blog.html">posts</a></li>
    <li><a href="/gallery.html">gallery</a></li>
    <li><a href="/about.html">about</a></li>
  </ul>
</nav>

<main class="container">

  <div class="terminal-hero terminal-hero--compact">
    <div class="dots"><span></span><span></span><span></span></div>
    <div class="title">
      <span class="prompt">~/c1991/gallery</span>
      <span class="tilde"> $ </span>
      <span class="cmd">ls -la</span>
    </div>
    <div class="subtitle">Photographs and visual fragments.</div>
  </div>

  <div class="gallery-grid" id="gallery-grid">
    <div class="empty-state">No photos yet. Stay tuned.</div>
  </div>

  <div class="lightbox" id="lightbox">
    <button type="button" class="close" id="lightbox-close" aria-label="Close">&times;</button>
    <img src="" alt="" id="lightbox-img">
  </div>

</main>

<footer class="footer">
  &copy; 2026 C1991 &middot; <a href="https://github.com/jackyang19911102/c1991">source</a>
</footer>

<script src="/js/main.js"></script>
<script>
(async function() {
  const grid = document.getElementById('gallery-grid');
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');

  try {
    const res = await fetch('/images/manifest.json');
    if (res.ok) {
      const images = await res.json();
      if (images.length) {
        grid.innerHTML = images.map(img =>
          `<img src="/images/${img.file}" alt="${img.alt || ''}" loading="lazy">`
        ).join('');
        grid.querySelectorAll('img').forEach(img => {
          img.addEventListener('click', () => {
            lbImg.src = img.src;
            lbImg.alt = img.alt;
            lb.classList.add('open');
          });
        });
      }
    }
  } catch(e) {}

  document.getElementById('lightbox-close').addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
})();
</script>
</body>
</html>
